name: Docker Build & Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKERHUB_USERNAME: nasir17
  IMAGE_NAME: week5ver-bot

permissions:
  contents: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update docker-compose image tag
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE="${DOCKERHUB_USERNAME}/${IMAGE_NAME}:${GITHUB_SHA}"
          sed -i -E "s#image: ${DOCKERHUB_USERNAME}/${IMAGE_NAME}:.*#image: ${IMAGE}#" docker-compose.yml

          if git diff --quiet docker-compose.yml; then
            echo "docker-compose.yml already uses ${IMAGE}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docker-compose.yml
          git commit -m "chore: update docker image tag to ${GITHUB_SHA} [skip ci]"
          git push
